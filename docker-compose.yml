services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: proedge
      POSTGRES_PASSWORD: proedge
      POSTGRES_DB: proedge
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proedge"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn proedge.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://proedge:proedge@db:5432/proedge
      MODEL_REGISTRY_PATH: /app/models
    ports:
      - "8001:8000"
    volumes:
      - ./src:/app/src
      - ./models:/app/models
    depends_on:
      db:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: proedge
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

volumes:
  pgdata:
  grafana_data:
