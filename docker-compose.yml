services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proedge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proedge}
      POSTGRES_DB: ${POSTGRES_DB:-proedge}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proedge}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-proedge}:${POSTGRES_PASSWORD:-proedge}@db:5432/${POSTGRES_DB:-proedge}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-proedge}:${POSTGRES_PASSWORD:-proedge}@db:5432/${POSTGRES_DB:-proedge}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: uvicorn proedge.api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-proedge}:${POSTGRES_PASSWORD:-proedge}@db:5432/${POSTGRES_DB:-proedge}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-proedge}:${POSTGRES_PASSWORD:-proedge}@db:5432/${POSTGRES_DB:-proedge}
      MODEL_REGISTRY_PATH: /app/models
    ports:
      - "8001:8000"
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-proedge}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/proedge.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

volumes:
  pgdata:
  grafana_data:
